name: Deploy static game to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate:
    name: Validate static game
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check JavaScript syntax
        run: |
          node --check game/app.js
          node --check game/game-data.js

      - name: Check Python helpers
        run: python3 -m py_compile scripts/build_game_content.py scripts/parse_epub_to_markdown.py

  deploy:
    name: Deploy game
    runs-on: ubuntu-latest
    needs: validate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload game artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: game

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
