<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>武周逆转录</title>
    <link rel="icon" type="image/png" href="./assets/favicon.png" />
    <script>
      window.__wzAssetVersion = String(Date.now());
      (function loadStylesheet() {
        const link = document.createElement("link");
        link.rel = "stylesheet";
        link.href = `./styles.css?v=${window.__wzAssetVersion}`;
        document.head.appendChild(link);
      })();
    </script>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <button class="icon-button menu-home-button" id="homeButton" type="button" aria-label="返回主菜单">菜单</button>
        <div class="brand">
          <span class="brand-mark">武</span>
          <div>
            <strong>武周逆转录</strong>
            <small>宫门翻案</small>
          </div>
        </div>
        <div class="status-strip" id="statusStrip"></div>
      </header>

      <main id="app" class="app-main" aria-live="polite"></main>
    </div>

    <script>
      (function bootGame() {
        const loadScript = (src) =>
          new Promise((resolve, reject) => {
            const script = document.createElement("script");
            script.src = src;
            script.onload = resolve;
            script.onerror = reject;
            document.body.appendChild(script);
          });

        loadScript(`./game-data.js?v=${window.__wzAssetVersion}`)
          .then(() => loadScript(`./app.js?v=${window.__wzAssetVersion}`))
          .catch((error) => {
            console.error("Failed to boot game assets", error);
          });
      })();
    </script>
  </body>
</html>
